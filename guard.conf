# ==========================================================================
# JX OS Sentinel Guard Configuration Profile
# File Path: /opt/jx/etc/jx-sentinel/guard.conf
# ==========================================================================

[Global]
# Default fallback mode if a target does not override it.
DefaultMode=prompt
ScanInterval=1s

# ==========================================================================
# TARGET DEFINITIONS (PROTECTION ZONES)
# ==========================================================================

[Target:UserPersistence]
# Tracks hidden folders inside the user's home directory where malware,
# installers, or Wine setups try to establish permanent autostart footholds.
Paths=/home/jackson/.config/autostart/,/home/jackson/.local/share/applications/
Mode=prompt
Description="User-space desktop autostart and file association hooks"

[Target:ShellPurity]
# Monitors terminal profile configs to prevent malicious installers from
# planting aliases, altering $PATH, or intercepting command-line utilities.
Paths=/home/jackson/.bashrc,/home/jackson/.zshrc,/home/jackson/.profile
Mode=prompt
Description="User shell environment profiles"

[Target:SystemPrivilegeHooks]
# Pure system vulnerability vectors. A standard application should NEVER touch these.
# If an installer tries to drop passwordless root rules, it is instantly killed.
Paths=/etc/sudoers.d/,/etc/xdg/autostart/
Mode=block
Description="System-wide privilege escalations and global autostarts"

[Target:ExecutableIntegrity]
# Guards local binary paths and binary format execution handlers.
# This keeps your native core and custom FEX/Wine translation layers safe from tampering.
Paths=/usr/local/bin/,/etc/binfmt.d/
Mode=block
Description="Binary execution paths and Kernel execution routing rules"

[Target:HardwareFirmware]
# Advanced stealth persistence. Keeps malicious binary blobs out of the hardware loader.
Paths=/lib/firmware/
Mode=log
Description="Kernel hardware device firmware directories"

[Target:SentinelSelfProtection]
# Protects Sentinel's executables, policy, and service unit from ordinary tampering.
# Maintenance writes should go through the packaged installer or privileged helper.
Paths=/opt/jx/bin/,/opt/jx/sbin/,/opt/jx/libexec/,/opt/jx/etc/jx-sentinel/,/etc/systemd/system/jx-sentinel-guard.service
Mode=block
Description="JX Sentinel self-protection assets"

# ==========================================================================
# PROCESS ALLOWLIST (TRUSTED REQUISITES)
# ==========================================================================

[Allowlist]
# Programs explicitly trusted by JX OS to modify files inside protected paths.
Executables=/usr/bin/nautilus,/usr/bin/sudo,/usr/bin/install,/opt/jx/bin/jx-sentinel-control,/opt/jx/bin/jx-permission-agent
